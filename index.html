<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob: https://static.cloudflareinsights.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:* http://127.0.0.1:* ws://127.0.0.1:* https://*.objectstorage.*.oraclecloud.com https://*.s3.*.amazonaws.com https://*.s3.amazonaws.com https://*.blob.core.windows.net https://storage.googleapis.com https://*.basemaps.cartocdn.com; frame-src 'none'; object-src 'none'; base-uri 'self';" />

    <meta name="description" content="ThreatCaddy — Threat Investigation Workspace. Notes, IOCs, Timelines & Graphs. Local-first. Your data is yours." />
    <meta name="theme-color" content="#030712" />
    <meta name="keywords" content="threat intelligence, IOC analysis, incident response, MITRE ATT&CK, graph visualization, security analysis, notes, tasks, privacy, offline, local storage, no tracking" />
    <link rel="canonical" href="https://threatcaddy.com/" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./logo.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ThreatCaddy" />
    <meta property="og:title" content="ThreatCaddy — Threat Investigation Workspace" />
    <meta property="og:description" content="Notes, IOCs, Timelines & Graphs. Local-first. Your data is yours." />
    <meta property="og:url" content="https://threatcaddy.com/" />
    <meta property="og:image" content="https://threatcaddy.com/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ThreatCaddy — Threat Investigation Workspace" />
    <meta name="twitter:description" content="Notes, IOCs, Timelines & Graphs. Local-first. Your data is yours." />
    <meta name="twitter:image" content="https://threatcaddy.com/og-image.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ThreatCaddy",
      "url": "https://threatcaddy.com/",
      "description": "Threat Investigation Workspace. Notes, IOCs, Timelines & Graphs. Local-first. Your data is yours.",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <title>ThreatCaddy</title>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
        <style>@keyframes tc-spin{to{transform:rotate(360deg)}}</style>
        <div style="width:36px;height:36px;border:3px solid rgba(139,92,246,.25);border-top-color:#8b5cf6;border-radius:50%;animation:tc-spin .8s linear infinite"></div>
        <span style="color:#6b7280;font-size:13px;font-family:system-ui,sans-serif">Loading ThreatCaddy…</span>
      </div>
    </div>
    <script src="./chunk-reload-guard.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
