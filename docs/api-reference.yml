                  api_roots:
                    type: array
                    items:
                      type: string

  /api/taxii/collections/:
    get:
      tags: [taxii]
      summary: List TAXII collections
      description: Returns one collection per investigation the user has access to
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Collection list
          content:
            application/taxii+json;version=2.1:
              schema:
                type: object
                properties:
                  collections:
                    type: array
                    items:
                      $ref: "#/components/schemas/TAXIICollection"

  /api/taxii/collections/{id}/:
