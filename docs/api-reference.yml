      summary: Get collection metadata
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection metadata
          content:
            application/taxii+json;version=2.1:
              schema:
                $ref: "#/components/schemas/TAXIICollection"
        "403":
