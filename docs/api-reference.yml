openapi: 3.1.0
info:
  title: ThreatCaddy API
  version: 1.0.0
  description: Threat intelligence investigation platform API

servers:
  - url: http://localhost:3001

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication and account management
  - name: users
    description: User management
  - name: investigations
    description: Investigation management
  - name: sync
    description: Data synchronization
  - name: files
    description: File upload and retrieval
  - name: backups
    description: Encrypted backup management
  - name: audit
    description: Audit log access
  - name: bots
    description: Automation bot management
  - name: integrations
    description: Integration template management
  - name: llm
    description: LLM chat and configuration
  - name: notifications
    description: User notifications
  - name: caddyshack
    description: Social feed (CaddyShack)
  - name: saved-searches
    description: Saved search management
  - name: taxii
    description: TAXII 2.1 collection server for STIX bundle sharing
  - name: health
    description: Server health and info

paths:
  # ─── Health ───────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Server health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/server/info:
    get:
      operationId: getServerInfo
      tags: [health]
      summary: Server info
      security: []
      responses:
        "200":
          description: Basic server information
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverName:
                    type: string
                required: [serverName]

  # ─── Auth ─────────────────────────────────────────────────────────────
  /api/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: "Rate limit: 5 requests per minute."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      description: "Rate limit: 10 requests per minute."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      description: "Rate limit: 20 requests per minute."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 15
                avatarUrl:
                  type:
                    - string
                    - "null"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
              required: [oldPassword, newPassword]
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Users ────────────────────────────────────────────────────────────
  /api/users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      description: "With a search parameter, any authenticated user can search by display name or email. Without search, the full user list requires admin role (returns 403 for non-admins)."
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PaginatedUsers"
                  - type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      description: "Requires admin role. Can update role, active status, and displayName."
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                active:
                  type: boolean
                displayName:
                  type: string
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Deactivate user (admin only)
      description: "Requires admin role. Deactivates the user, invalidates all sessions, and disconnects WebSocket connections. Cannot deactivate yourself."
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{id}/feed:
    get:
      operationId: getUserFeed
      tags: [users]
      summary: Get posts by a user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{id}/likes:
    get:
      operationId: getUserLikes
      tags: [users]
      summary: Get posts liked by a user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Liked posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{id}/activity:
    get:
      operationId: getUserActivity
      tags: [users]
      summary: Get user activity log
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Investigations ──────────────────────────────────────────────────
  /api/investigations:
    get:
      operationId: listInvestigations
      tags: [investigations]
      summary: List investigations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated investigations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInvestigations"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/investigations/{id}/summary:
    get:
      operationId: getInvestigationSummary
      tags: [investigations]
      summary: Get investigation summary
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
      responses:
        "200":
          description: Investigation summary with members and entity counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestigationSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/investigations/{id}/members:
    get:
      operationId: listInvestigationMembers
      tags: [investigations]
      summary: List investigation members
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
      responses:
        "200":
          description: Investigation members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: addInvestigationMember
      tags: [investigations]
      summary: Add a member to an investigation
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                role:
                  type: string
              required: [userId]
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/investigations/{id}/members/{userId}:
    patch:
      operationId: updateInvestigationMember
      tags: [investigations]
      summary: Update member role
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
              required: [role]
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeInvestigationMember
      tags: [investigations]
      summary: Remove member from investigation
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/investigations/{id}:
    delete:
      operationId: deleteInvestigation
      tags: [investigations]
      summary: Delete investigation (owner only)
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
      responses:
        "200":
          description: Investigation deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/investigations/{id}/invite:
    post:
      operationId: inviteToInvestigation
      tags: [investigations]
      summary: Invite user to investigation by email
      parameters:
        - $ref: "#/components/parameters/InvestigationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
              required: [email]
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Sync ─────────────────────────────────────────────────────────────
  /api/sync/push:
    post:
      operationId: syncPush
      tags: [sync]
      summary: Push local changes to server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                changes:
                  type: array
                  items:
                    $ref: "#/components/schemas/SyncChange"
              required: [changes]
      responses:
        "200":
          description: Push results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncResult"
                required: [results]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sync/pull:
    get:
      operationId: syncPull
      tags: [sync]
      summary: Pull remote changes
      parameters:
        - name: since
          in: query
          description: ISO 8601 timestamp to pull changes since
          schema:
            type: string
            format: date-time
        - name: folderId
          in: query
          schema:
            type: string
        - name: metadataOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Changes since the given timestamp
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncChange"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/sync/snapshot/{folderId}:
    get:
      operationId: syncSnapshot
      tags: [sync]
      summary: Get full investigation snapshot
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full investigation snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestigationSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Files ────────────────────────────────────────────────────────────
  /api/files/upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file (admin/analyst only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max 50 MB)
                folderId:
                  type: string
                  description: Optional investigation folder ID to scope the file to
              required: [file]
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/files/{id}:
    get:
      operationId: getFile
      tags: [files]
      summary: Download a file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/files/{id}/thumbnail:
    get:
      operationId: getFileThumbnail
      tags: [files]
      summary: Get file thumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: WebP thumbnail image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Backups ──────────────────────────────────────────────────────────
  /api/backups:
    post:
      operationId: createBackup
      tags: [backups]
      summary: Upload an encrypted backup
      description: "Rate limit: 5 requests per minute."
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: string
                  description: JSON-encoded backup metadata
                blob:
                  type: string
                  format: binary
                  description: Encrypted backup blob
              required: [metadata, blob]
      responses:
        "201":
          description: Backup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      operationId: listBackups
      tags: [backups]
      summary: List backups
      description: "Rate limit: 5 requests per minute."
      responses:
        "200":
          description: List of backups
          content:
            application/json:
              schema:
                type: object
                properties:
                  backups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Backup"
                required: [backups]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backups/{id}:
    get:
      operationId: getBackup
      tags: [backups]
      summary: Download an encrypted backup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Encrypted backup file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteBackup
      tags: [backups]
      summary: Delete a backup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Audit ────────────────────────────────────────────────────────────
  /api/audit:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: Get audit log entries
      parameters:
        - name: folderId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/audit/team:
    get:
      operationId: getTeamAuditLog
      tags: [audit]
      summary: Get team-wide audit log
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Team audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Bots ─────────────────────────────────────────────────────────────
  /api/bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List bots (admin/analyst)
      responses:
        "200":
          description: Bot configurations
          content:
            application/json:
              schema:
                type: object
                properties:
                  bots:
                    type: array
                    items:
                      $ref: "#/components/schemas/BotConfig"
                required: [bots]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a bot (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfig"
      responses:
        "201":
          description: Bot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  bot:
                    $ref: "#/components/schemas/BotConfig"
                required: [bot]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get bot by ID (admin/analyst)
      parameters:
        - $ref: "#/components/parameters/BotId"
      responses:
        "200":
          description: Bot configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  bot:
                    $ref: "#/components/schemas/BotConfig"
                required: [bot]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateBot
      tags: [bots]
      summary: Update a bot (admin only)
      parameters:
        - $ref: "#/components/parameters/BotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
