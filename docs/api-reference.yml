  /api/taxii/collections/{id}/objects/:
    get:
      tags: [taxii]
      summary: Get STIX bundle
      description: Returns a STIX 2.1 bundle containing all IOCs from the investigation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: STIX 2.1 bundle
          content:
            application/stix+json;version=2.1:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    const: bundle
                  id:
                    type: string
                  objects:
                    type: array
                    items:
                      type: object
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  # ─── Security Schemes ───────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: EdDSA-signed JWT access token

  # ─── Reusable Parameters ────────────────────────────────────────────
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
    InvestigationId:
      name: id
      in: path
      required: true
      schema:
        type: string
    BotId:
      name: id
      in: path
      required: true
      schema:
        type: string
    PostId:
      name: id
      in: path
      required: true
      schema:
        type: string

  # ─── Reusable Responses ─────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # ─── Schemas ─────────────────────────────────────────────────────────
  schemas:
    # ── TAXII ───────────────────────────────────────────────────────
    TAXIICollection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        can_read:
          type: boolean
        can_write:
          type: boolean
        media_types:
          type: array
          items:
            type: string

    # ── Common ──────────────────────────────────────────────────────
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
      required: [ok]

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
      required: [error]

    # ── Auth ────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 15
        password:
          type: string
          minLength: 8
          maxLength: 128
      required: [email, displayName, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [accessToken, refreshToken, user]

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
      required: [id, email, displayName, role]

    # ── Users ───────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, displayName, role]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        createdAt:
          type: string
          format: date-time
      required: [id, email, displayName, role, createdAt]

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [data, total, limit, offset]

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        action:
          type: string
        detail:
          type: string
        itemId:
          type:
            - string
            - "null"
        itemTitle:
          type:
            - string
            - "null"
        folderId:
          type:
            - string
            - "null"
        timestamp:
          type: string
          format: date-time
      required: [id, category, action, timestamp]

    # ── Investigations ──────────────────────────────────────────────
    InvestigationMembership:
      type: object
      properties:
        folderId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        joinedAt:
          type: string
          format: date-time
        folder:
          type: object
          properties:
            name:
              type: string
            status:
              type: string
            color:
              type: string
            icon:
              type: string
            description:
              type: string
            clsLevel:
              type: string
            papLevel:
              type: string
            tags:
              type: array
              items:
                type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
        entityCounts:
          type: object
          properties:
            notes:
              type: integer
            tasks:
              type: integer
            iocs:
              type: integer
            events:
              type: integer
            whiteboards:
              type: integer
            chats:
              type: integer
        memberCount:
          type: integer
      required: [folderId, role, folder, entityCounts, memberCount]

    PaginatedInvestigations:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InvestigationMembership"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [data, total, limit, offset]

    InvestigationSummary:
      type: object
      properties:
        folder:
          type: object
          properties:
            name:
              type: string
            status:
              type: string
            color:
              type: string
            icon:
              type: string
            description:
              type: string
            clsLevel:
              type: string
            papLevel:
              type: string
            tags:
              type: array
              items:
                type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
          required: [name]
        entityCounts:
          type: object
          properties:
            notes:
              type: integer
            tasks:
              type: integer
            iocs:
              type: integer
            events:
              type: integer
            whiteboards:
              type: integer
            chats:
              type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        lastActivity:
          type:
            - string
            - "null"
          format: date-time
      required: [folder, entityCounts, members]

    Member:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        joinedAt:
          type: string
          format: date-time
        displayName:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type:
            - string
            - "null"
      required: [id, userId, role, displayName, email]

    # ── Entities (Notes, Tasks, IOCs, Timeline) ─────────────────────
    Note:
      type: object
      properties:
        id:
          type: string
        folderId:
          type: string
        title:
          type: string
        content:
          type: string
        authorId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, folderId, title, authorId, createdAt]

    Task:
      type: object
      properties:
        id:
          type: string
        folderId:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assigneeId:
          type:
            - string
            - "null"
        authorId:
          type: string
        dueDate:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, folderId, title, status, authorId, createdAt]

    IOC:
      type: object
      properties:
        id:
          type: string
        folderId:
          type: string
        type:
          type: string
          description: "IOC type (e.g., ip, domain, hash, email, url)"
        value:
          type: string
        description:
          type: string
        tlp:
          type: string
        confidence:
          type: string
        authorId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, folderId, type, value, authorId, createdAt]

    TimelineEvent:
      type: object
      properties:
        id:
          type: string
        folderId:
          type: string
        title:
          type: string
        description:
          type: string
        eventTime:
          type: string
          format: date-time
        category:
          type: string
        authorId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, folderId, title, eventTime, authorId, createdAt]

    # ── Sync ────────────────────────────────────────────────────────
    SyncChange:
      type: object
      properties:
        table:
          type: string
        op:
          type: string
          enum: [put, delete]
        entityId:
          type: string
        data:
          type: object
        clientVersion:
          type: integer
      required: [table, op, entityId]

    SyncResult:
      type: object
      properties:
        table:
          type: string
        entityId:
          type: string
        status:
          type: string
          enum: [accepted, conflict, rejected]
        serverVersion:
          type: integer
        serverData:
          type: object
        serverRecord:
          type: object
      required: [table, entityId, status]

    InvestigationSnapshot:
      type: object
      description: "Map of table names to arrays of entity rows. Keys include: folders, notes, tasks, standaloneIOCs, timelineEvents, whiteboards, chatThreads, etc."
      additionalProperties:
        type: array
        items:
          type: object

    # ── Files ───────────────────────────────────────────────────────
    FileMetadata:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        thumbnailUrl:
          type:
            - string
            - "null"
        mimeType:
          type: string
        size:
          type: integer
        filename:
          type: string
      required: [id, url, mimeType, size, filename]

    # ── Backups ─────────────────────────────────────────────────────
    Backup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [full, differential]
        scope:
          type: string
          enum: [all, investigation, entity]
        scopeId:
          type:
            - string
            - "null"
        entityCount:
          type: integer
        sizeBytes:
          type: integer
        parentBackupId:
          type:
            - string
            - "null"
        createdAt:
          type: string
          format: date-time
      required: [id, name, type, scope, entityCount, sizeBytes, createdAt]

    # ── Audit ───────────────────────────────────────────────────────
    AuditEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        category:
          type: string
        action:
          type: string
        detail:
          type: string
        itemId:
          type:
            - string
            - "null"
        itemTitle:
          type:
            - string
            - "null"
        folderId:
          type:
            - string
            - "null"
        timestamp:
          type: string
          format: date-time
        userDisplayName:
          type: string
        userAvatarUrl:
          type:
            - string
            - "null"
      required: [id, userId, category, action, timestamp]

    # ── Bots ────────────────────────────────────────────────────────
    BotConfig:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        enabled:
          type: boolean
        config:
          type: object
        schedule:
          type: string
          description: Cron expression for scheduled bots
        webhookSecret:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, enabled]

    BotConfigPartial:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
        enabled:
          type: boolean
        config:
          type: object
        schedule:
          type: string
        webhookSecret:
          type: string

    BotRun:
      type: object
      properties:
        id:
          type: string
        botId:
          type: string
        status:
          type: string
          enum: [running, success, failure]
        trigger:
          type: string
          enum: [scheduled, manual, webhook]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type:
            - string
            - "null"
          format: date-time
        result:
          type: object
        error:
          type: string
      required: [id, botId, status, trigger, startedAt]

    # ── Integrations ────────────────────────────────────────────────
    IntegrationTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        template:
          type: object
          description: "The integration template definition containing name, version, description, category, steps, outputs, triggers"
        sharedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, template, sharedBy]

    IntegrationTemplateInput:
      type: object
      properties:
        template:
          type: object
          description: "Integration template object with required fields: name (string), steps (array), outputs (array or object). Optional: version, description, category, triggers."
          properties:
            name:
              type: string
            version:
              type: string
            description:
              type: string
            category:
              type: string
            steps:
              type: array
              items:
                type: object
            outputs:
              oneOf:
                - type: array
                  items:
                    type: object
                - type: object
            triggers:
              type: array
              items:
                type: object
          required: [name, steps, outputs]
      required: [template]

    # ── LLM ─────────────────────────────────────────────────────────
    LLMChatRequest:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/LLMMessage"
      required: [provider, model, messages]

    LLMMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
      required: [role, content]

    LLMProvider:
      type: object
      properties:
        provider:
          type: string
          description: "Provider identifier (e.g., anthropic, openai, gemini, mistral)"
        models:
          type: array
          items:
            type: string
          description: "List of available model identifiers"
      required: [provider, models]

    # ── Notifications ───────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        sourceUserId:
          type:
            - string
            - "null"
        postId:
          type:
            - string
            - "null"
        folderId:
          type:
            - string
            - "null"
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        sourceUserDisplayName:
          type:
            - string
            - "null"
        sourceUserAvatarUrl:
          type:
            - string
            - "null"
      required: [id, type, message, read, createdAt]

    # ── CaddyShack (Social Feed) ───────────────────────────────────
    Post:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        authorDisplayName:
          type: string
        authorAvatarUrl:
          type:
            - string
            - "null"
        content:
          type: string
        attachments:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              url:
                type: string
              type:
                type: string
                enum: [image, video, audio, document]
              mimeType:
                type: string
              filename:
                type: string
            required: [id, url, type, mimeType, filename]
        mentions:
          type: array
          items:
            type: string
        folderId:
          type:
            - string
            - "null"
        parentId:
          type:
            - string
            - "null"
        replyToId:
          type:
            - string
            - "null"
        clsLevel:
          type: string
        pinned:
          type: boolean
        reactions:
          type: object
          additionalProperties:
            type: object
            properties:
              count:
                type: integer
              userIds:
                type: array
                items:
                  type: string
            required: [count, userIds]
          description: "Record keyed by emoji string, e.g. { \"thumbsup\": { count: 2, userIds: [...] } }"
        replyCount:
          type: integer
        replies:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, authorId, content, createdAt]

    CreatePostRequest:
      type: object
      properties:
        content:
          type: string
        attachments:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              url:
                type: string
              type:
                type: string
                enum: [image, video, audio, document]
              mimeType:
                type: string
              filename:
                type: string
            required: [id, url, type, mimeType, filename]
        mentions:
          type: array
          items:
            type: string
        folderId:
          type: string
        parentId:
          type: string
        replyToId:
          type: string
        clsLevel:
          type: string
      required: [content]

    # ── Saved Searches ──────────────────────────────────────────────
    SavedSearch:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        query:
          type: string
        filters:
          type: object
        isShared:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, name, query, createdAt]

    SavedSearchInput:
      type: object
      properties:
        name:
          type: string
        query:
          type: string
        filters:
          type: object
        isShared:
          type: boolean
      required: [name, query]

    # ── Health ──────────────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        db:
          type: string
        storage:
          type: string
        version:
          type: string
        uptime:
          type: number
        memory:
          type: object
          properties:
            rss:
              type: integer
            heapUsed:
              type: integer
            heapTotal:
              type: integer
        timestamp:
          type: string
          format: date-time
      required: [status, version, uptime, timestamp]
